version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: octant_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
      - ./reports:/tmp/octant_reports
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - RESON8_API_KEY=${RESON8_API_KEY}
      - FAL_API_KEY=${FAL_API_KEY}
      - LOG_LEVEL=DEBUG
      - LOG_FORMAT=pretty
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: node:22-alpine
    container_name: octant_frontend
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    environment:
      - VITE_API_BASE=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
